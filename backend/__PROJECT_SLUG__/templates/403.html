<!DOCTYPE html>
{% comment %}
Self-contained, brand-neutral 403 (see 404.html for rationale). No base.html, no
CDN chrome, and Django's exception context is never rendered.
{% endcomment %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>403: Forbidden.</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: #000;
        background: #fff;
      }

      .row {
        display: flex;
        align-items: center;
      }

      .code {
        font-size: 24px;
        font-weight: 500;
        padding: 0 23px 0 0;
        margin: 0;
        border-right: 1px solid rgba(0, 0, 0, 0.3);
        line-height: 49px;
      }

      .msg {
        font-size: 14px;
        font-weight: 400;
        line-height: 49px;
        margin: 0 0 0 23px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <h1 class="code">403</h1>
      <p class="msg">You don't have permission to access this page.</p>
    </div>
  </body>
</html>
