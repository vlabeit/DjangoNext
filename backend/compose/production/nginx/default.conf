# Serves user-uploaded media for the local (FileSystemStorage) backend.
# The production_django_media volume is mounted here read-only and is the same
# volume Django (and celeryworker) write uploads to at /app/<slug>/media.
# Traefik routes Host/PathPrefix(`/media`) here at a higher priority than Django.
server {
    listen 80;
    server_name _;
    # Uploads can be large; do not cap at nginx's 1m default.
    client_max_body_size 0;

    # Lightweight liveness endpoint.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
